<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Tony Tumbler Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #gameWrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    canvas {
      display: block;
      border: 3px solid #e94560;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(233, 69, 96, 0.5);
      max-width: 100vw;
      max-height: calc(100vh - 100px);
    }
    #hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 8px 4px;
      color: #eee;
      font-size: 18px;
      font-weight: bold;
    }
    #hud span { color: #e94560; }
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      color: white;
      text-align: center;
    }
    #overlay h1 { font-size: 2.2rem; color: #e94560; text-shadow: 0 0 20px #e94560; margin-bottom: 10px; }
    #overlay p  { font-size: 1rem; color: #ccc; margin-bottom: 6px; }
    #overlay .score-display { font-size: 1.4rem; color: #ffd700; margin: 10px 0; }
    #startBtn {
      margin-top: 18px;
      padding: 12px 36px;
      font-size: 1.1rem;
      font-weight: bold;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    #startBtn:hover { background: #c73652; transform: scale(1.05); }
    /* ── Mobile touch buttons ── */
    #touchControls {
      display: none;
      width: 100%;
      justify-content: space-between;
      padding: 8px 4px 0;
      gap: 8px;
    }
    .touchBtn {
      flex: 1;
      height: 64px;
      background: rgba(233,69,96,0.18);
      border: 2px solid #e94560;
      border-radius: 12px;
      color: #e94560;
      font-size: 2rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s;
      user-select: none;
    }
    .touchBtn:active, .touchBtn.pressed {
      background: rgba(233,69,96,0.45);
    }
    @media (pointer: coarse) {
      #touchControls { display: flex; }
    }
    #alarm {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 120px;
      pointer-events: none;
      display: none;
      animation: alarmPulse 0.3s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 20px red);
      z-index: 10;
    }
    @keyframes alarmPulse {
      from { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
      to   { transform: translate(-50%, -50%) scale(1.15); opacity: 0.7; }
    }
  </style>
</head>

function drawTony(x, y, w, h, angle) {
  ctx.save();
  ctx.translate(x + w/2, y + h/2);
  ctx.rotate(angle);

  if (tonyImg.complete && tonyImg.naturalWidth > 0) {
    // Draw the real Tony image, scaled to fit
    ctx.drawImage(tonyImg, -w/2, -h/2, w, h);
  } else {
    // Fallback circle while image loads
    ctx.beginPath();
    ctx.arc(0, 0, w * 0.44, 0, Math.PI * 2);
    ctx.fillStyle = '#f9c06a';
    ctx.fill();
  }

  // âš¡ warning icon above
  ctx.font = `${w * 0.32}px serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff4444';
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 6;
  ctx.fillText('âš¡', 0, -h * 0.58);
  ctx.shadowBlur = 0;

  ctx.restore();
}

// â”€â”€â”€ Player (the dodge-craft) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function drawPlayer(p) {
  const x = p.x, y = p.y, w = PLAYER_W, h = PLAYER_H;

  // Main body
  ctx.fillStyle = '#16213e';
  ctx.strokeStyle = '#00d4ff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 8);
  ctx.fill();
  ctx.stroke();

  // Cockpit window
  ctx.fillStyle = '#00d4ff';
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.ellipse(x + w/2, y + h/2 - 2, w*0.22, h*0.32, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Engine glow
  const grad = ctx.createLinearGradient(x + w*0.3, y+h, x + w*0.7, y+h+10);
  grad.addColorStop(0, 'rgba(255,150,0,0.9)');
  grad.addColorStop(1, 'rgba(255,80,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(x + w*0.32, y+h);
  ctx.lineTo(x + w*0.68, y+h);
  ctx.lineTo(x + w*0.55, y+h+12);
  ctx.lineTo(x + w*0.45, y+h+12);
  ctx.closePath();
  ctx.fill();

  // Shield flash when invincible
  if (p.invincible) {
    ctx.strokeStyle = `rgba(0,212,255,${0.4 + 0.6*Math.sin(Date.now()*0.02)})`;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.roundRect(x-4, y-4, w+8, h+8, 12);
    ctx.stroke();
  }
}

// â”€â”€â”€ Background starfield â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const stars = Array.from({length: 80}, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  r: Math.random() * 1.5 + 0.3,
  speed: Math.random() * 0.4 + 0.1
}));

function drawBackground() {
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (const s of stars) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${0.4 + s.r * 0.3})`;
    ctx.fill();
    s.y += s.speed;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
  }
}

// â”€â”€â”€ Particles â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
let particles = [];
function spawnParticles(x, y) {
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      color: ['#e94560','#ffd700','#ff8c00','#ff4444'][Math.floor(Math.random()*4)],
      r: Math.random() * 4 + 2
    });
  }
}
function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.03;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// â”€â”€â”€ Tumbler spawning â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function spawnTumbler() {
  const margin = 20;
  const x = margin + Math.random() * (canvas.width - TUMBLER_W - margin*2);
  tumblers.push({
    x, y: -TUMBLER_H,
    speed: 2 + level * 0.6 + Math.random() * 1.2,
    rotation: 0,
    rotSpeed: (Math.random() - 0.5) * 0.12,
    passed: false
  });
}

// â”€â”€â”€ Init â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function initGame() {
  player = {
    x: canvas.width/2 - PLAYER_W/2,
    y: canvas.height - PLAYER_H - 20,
    invincible: false,
    invincibleTimer: 0
  };
  tumblers = [];
  particles = [];
  score = 0;
  lives = MAX_LIVES;
  level = 1;
  spawnDelay = 1800;
  lastSpawnTime = performance.now();
  updateHUD();
}

function updateHUD() {
  scoreEl.textContent = score;
  levelEl.textContent = level;
  livesEl.textContent = 'â¤ï¸'.repeat(lives) + 'ðŸ–¤'.repeat(MAX_LIVES - lives);
}

// â”€â”€â”€ Alarm flash â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function showAlarm() {
  alarmEl.style.display = 'block';
  clearTimeout(alarmTimer);
  alarmTimer = setTimeout(() => { alarmEl.style.display = 'none'; }, 1500);
}

// â”€â”€â”€ Collision â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function rectsOverlap(ax,ay,aw,ah, bx,by,bw,bh, shrink=8) {
  return ax+shrink < bx+bw-shrink &&
         ax+aw-shrink > bx+shrink &&
         ay+shrink < by+bh-shrink &&
         ay+ah-shrink > by+shrink;
}

// â”€â”€â”€ Main Loop â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function loop(ts) {
  if (!gameRunning) return;
  animId = requestAnimationFrame(loop);

  drawBackground();

  // Player movement
  if (keys['ArrowLeft'] || keys['a'])  player.x = Math.max(0, player.x - PLAYER_SPEED);
  if (keys['ArrowRight'] || keys['d']) player.x = Math.min(canvas.width - PLAYER_W, player.x + PLAYER_SPEED);

  // Spawn tumblers
  if (ts - lastSpawnTime > spawnDelay) {
    spawnTumbler();
    lastSpawnTime = ts;
    // extra tumbler at higher levels
    if (level >= 3 && Math.random() < 0.4) spawnTumbler();
    if (level >= 5 && Math.random() < 0.3) spawnTumbler();
  }

  // Invincibility countdown
  if (player.invincible) {
    player.invincibleTimer -= 16;
    if (player.invincibleTimer <= 0) player.invincible = false;
  }

  // Update + draw tumblers
  for (let i = tumblers.length - 1; i >= 0; i--) {
    const t = tumblers[i];
    t.y += t.speed;
    t.rotation += t.rotSpeed;

    // Scored (passed player without hitting)
    if (!t.passed && t.y > player.y + PLAYER_H + 10) {
      t.passed = true;
      score += 10;
      scoreEl.textContent = score;

      // Level up every 100 points
      const newLevel = 1 + Math.floor(score / 100);
      if (newLevel > level) {
        level = newLevel;
        spawnDelay = Math.max(500, 1800 - level * 160);
        levelEl.textContent = level;
      }
    }

    // Off screen
    if (t.y > canvas.height + TUMBLER_H) {
      tumblers.splice(i, 1);
      continue;
    }

    // Collision
    if (!player.invincible &&
        rectsOverlap(player.x, player.y, PLAYER_W, PLAYER_H, t.x, t.y, TUMBLER_W, TUMBLER_H)) {
      spawnParticles(t.x + TUMBLER_W/2, t.y + TUMBLER_H/2);
      tumblers.splice(i, 1);
      lives--;
      updateHUD();
      showAlarm();
      if (lives <= 0) {
        endGame();
        return;
      }
      player.invincible = true;
      player.invincibleTimer = 2000;
      continue;
    }

    drawTony(t.x, t.y, TUMBLER_W, TUMBLER_H, t.rotation);
  }

  updateParticles();
  drawPlayer(player);

  // Score display overlay
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`Speed Ã—${(1 + level * 0.3).toFixed(1)}`, 10, 18);
}

  overlayTitle.textContent = 'ðŸ’¥ Game Over!';

// --- Responsive canvas sizing ---
function resizeCanvas() {
  var maxW = Math.min(480, window.innerWidth - 8);
  var scale = maxW / 480;
  canvas.style.width  = (480 * scale) + 'px';
  canvas.style.height = (600 * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// --- Touch controls ---
var btnLeft  = document.getElementById('btnLeft');
var btnRight = document.getElementById('btnRight');
function setTouch(btn, key, down) {
  btn.classList.toggle('pressed', down);
  keys[key] = down;
}
btnLeft.addEventListener('touchstart',  function(e){e.preventDefault();setTouch(btnLeft,'ArrowLeft',true);},{passive:false});
btnLeft.addEventListener('touchend',    function(e){e.preventDefault();setTouch(btnLeft,'ArrowLeft',false);},{passive:false});
btnLeft.addEventListener('touchcancel', function(e){e.preventDefault();setTouch(btnLeft,'ArrowLeft',false);},{passive:false});
btnRight.addEventListener('touchstart',  function(e){e.preventDefault();setTouch(btnRight,'ArrowRight',true);},{passive:false});
btnRight.addEventListener('touchend',    function(e){e.preventDefault();setTouch(btnRight,'ArrowRight',false);},{passive:false});
btnRight.addEventListener('touchcancel', function(e){e.preventDefault();setTouch(btnRight,'ArrowRight',false);},{passive:false});

var touchStartX = null;
canvas.addEventListener('touchstart',function(e){touchStartX=e.touches[0].clientX;},{passive:true});
canvas.addEventListener('touchmove',function(e){
  if(touchStartX===null)return;
  var dx=e.touches[0].clientX-touchStartX;
  keys['ArrowLeft']=dx<-10;
  keys['ArrowRight']=dx>10;
},{passive:true});
canvas.addEventListener('touchend',function(){keys['ArrowLeft']=false;keys['ArrowRight']=false;touchStartX=null;},{passive:true});
document.addEventListener('touchstart',function(e){if(e.touches.length>1)e.preventDefault();},{passive:false});

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  // prevent page scroll on arrows
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });
</script>
